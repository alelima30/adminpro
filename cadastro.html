<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AdminPro · Solicitar Acesso</title>
<meta name="theme-color" content="#132040">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --ink:#0D1629; --card:#1A2847; --card-2:#1F2D52;
    --border:rgba(255,255,255,0.10); --border-h:rgba(255,255,255,0.20);
    --gold:#E87722; --gold-l:#FF9A40; --green-l:#28C882; --red:#E05252;
    --text:#EEF1F8; --text-2:#8A9BBB; --text-3:#4E6080;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    background:linear-gradient(160deg,#1B2B5E,#0D1629);
    color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:28px 16px;min-height:100vh;
  }
  .box{
    width:100%;max-width:460px;background:var(--card);
    border:1px solid var(--border);border-radius:18px;
    box-shadow:0 24px 60px rgba(0,0,0,0.45);padding:34px 30px;
  }
  .brand{text-align:center;margin-bottom:6px;font-size:26px;font-weight:800;letter-spacing:.5px}
  .brand b{color:var(--gold)}
  .sub{text-align:center;color:var(--text-2);font-size:13.5px;margin-bottom:24px}
  label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin:14px 0 6px;letter-spacing:.3px}
  .req::after{content:' *';color:var(--gold)}
  .iw{position:relative}
  .iw i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:13px;opacity:.85}
  input,select{
    width:100%;padding:11px 14px 11px 38px;border-radius:10px;
    border:1px solid var(--border);background:var(--ink);color:var(--text);
    font-size:14px;outline:none;transition:border-color .15s;
  }
  select{cursor:pointer}
  input:focus,select:focus{border-color:var(--gold)}
  .hint{font-size:11px;color:var(--text-3);margin-top:5px}
  .btn{
    width:100%;margin-top:22px;padding:13px;border:none;border-radius:10px;
    background:linear-gradient(135deg,#B85E0F,#E87722 60%,#FF9A40);
    color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px;
    box-shadow:0 8px 20px rgba(232,119,34,0.3);transition:filter .15s;
  }
  .btn:hover{filter:brightness(1.06)}
  .btn:disabled{filter:grayscale(.5) brightness(.8);cursor:not-allowed}
  .msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:13px;display:none;line-height:1.5}
  .msg.ok{display:block;background:rgba(40,200,130,0.12);border:1px solid rgba(40,200,130,0.35);color:var(--green-l)}
  .msg.err{display:block;background:rgba(224,82,82,0.12);border:1px solid rgba(224,82,82,0.35);color:#ff9b9b}
  .foot{text-align:center;margin-top:20px;font-size:13px;color:var(--text-3)}
  .foot a{color:var(--gold);text-decoration:none;font-weight:600}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:420px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
  <form class="box" id="form" onsubmit="return false">
    <div class="brand">Admin<b>Pro</b></div>
    <div class="sub">Solicitar acesso ao portal do condomínio</div>

    <label class="req">Você pertence a qual condomínio?</label>
    <div class="iw"><i class="fa-solid fa-city"></i>
      <select id="c-cond" onchange="condSelecionado()"><option value="">Carregando condomínios...</option></select></div>

    <label class="req">Nome completo</label>
    <div class="iw"><i class="fa-solid fa-user"></i>
      <input type="text" id="c-nome" placeholder="Seu nome completo" autocomplete="name"></div>

    <label class="req">E-mail</label>
    <div class="iw"><i class="fa-solid fa-envelope"></i>
      <input type="email" id="c-email" placeholder="voce@exemplo.com" autocomplete="email"></div>

    <label class="req">Telefone / WhatsApp</label>
    <div class="iw"><i class="fa-brands fa-whatsapp"></i>
      <input type="text" id="c-tel" placeholder="(11) 99999-9999 — receberá os avisos" autocomplete="tel"></div>
    <div class="hint">Usaremos este WhatsApp para avisar reservas e encomendas.</div>

    <div class="row2">
      <div>
        <label class="req">Unidade</label>
        <div class="iw"><i class="fa-solid fa-house-chimney"></i>
          <select id="c-unidade"><option value="">Carregando unidades...</option></select></div>
      </div>
      <div>
        <label class="req">Vínculo</label>
        <div class="iw"><i class="fa-solid fa-id-badge"></i>
          <select id="c-vinculo">
            <option value="">Selecione...</option>
            <option value="proprietario">Proprietário</option>
            <option value="morador">Morador</option>
            <option value="inquilino">Inquilino</option>
          </select></div>
      </div>
    </div>
    <div class="hint" id="uni-hint">Selecione a unidade correspondente ao seu imóvel.</div>

    <div class="row2">
      <div>
        <label class="req">Senha</label>
        <div class="iw"><i class="fa-solid fa-lock"></i>
          <input type="password" id="c-senha" placeholder="Mín. 6 caracteres" autocomplete="new-password"></div>
      </div>
      <div>
        <label class="req">Confirmar senha</label>
        <div class="iw"><i class="fa-solid fa-lock"></i>
          <input type="password" id="c-senha2" placeholder="Repita a senha" autocomplete="new-password"></div>
      </div>
    </div>

    <label style="display:flex;align-items:flex-start;gap:10px;margin:16px 0 4px;font-size:12.5px;color:#c9d2e3;line-height:1.5;cursor:pointer">
      <input type="checkbox" id="c-lgpd" style="width:18px;height:18px;margin-top:1px;flex-shrink:0;accent-color:#E87722;cursor:pointer">
      <span>Li e concordo com o tratamento dos meus dados pessoais (nome, CPF, contato e unidade) para fins de gestão do condomínio, conforme a <b>Lei Geral de Proteção de Dados (LGPD — Lei nº 13.709/2018)</b>. Os dados são usados apenas pela administração e não são compartilhados com terceiros sem autorização.</span>
    </label>

    <button class="btn" id="btn" onclick="enviar()">Solicitar acesso</button>
    <div class="msg" id="msg"></div>

    <div class="foot">Já tem conta? <a href="adminpro.html">Entrar no portal &rarr;</a></div>
  </form>

  <!-- Aviso central de sucesso -->
  <div id="ok-ov" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(3,8,20,0.72);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:22px">
    <div style="max-width:420px;width:100%;background:#141c2e;border:1px solid rgba(42,157,111,0.4);border-radius:18px;padding:34px 26px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,0.5)">
      <div style="width:70px;height:70px;margin:0 auto 18px;border-radius:50%;background:rgba(42,157,111,0.16);display:flex;align-items:center;justify-content:center">
        <i class="fa-solid fa-check" style="font-size:32px;color:#2ecc8f"></i>
      </div>
      <div style="font-size:20px;font-weight:800;color:#eef1f8;margin-bottom:10px">Solicitação enviada!</div>
      <div id="ok-txt" style="font-size:14px;color:#c9d2e3;line-height:1.55;margin-bottom:22px"></div>
      <button onclick="document.getElementById('ok-ov').style.display='none'" style="width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#E87722,#B85E0F);color:#fff;font-size:15px;font-weight:700;cursor:pointer">Entendi</button>
      <div style="margin-top:14px"><a href="adminpro.html" style="color:#E87722;font-size:13px;text-decoration:none">Ir para o login &rarr;</a></div>
    </div>
  </div>

const CONDOMINIOS_FALLBACK = [{c:'APVC', n:'Associação Parque Village Castelo'}];

function montarSelectCondominios(lista){
  const sel=$('c-cond');
  let html='<option value="">Selecione o condomínio...</option>';
  lista.sort((a,b)=>a.n.localeCompare(b.n,'pt-BR'));
  lista.forEach(x=>{ html+='<option value="'+x.c+'">'+x.n+'</option>'; });
  sel.innerHTML=html;
  if(lista.length===1) sel.value=lista[0].c;
}

async function carregarCondominios(){
  montarSelectCondominios(CONDOMINIOS_FALLBACK.slice());
  if(!SB) return; // sem Supabase: fica com a lista embutida
  try{
    const { data } = await SB.from('condominios_publicos').select('codigo,nome');
    if(data && data.length){
      const atual=$('c-cond').value;
      montarSelectCondominios(data.map(c=>({c:c.codigo, n:c.nome||c.codigo})));
      if(atual)$('c-cond').value=atual;
    }
  }catch(e){ /* mantém fallback */ }
}
carregarCondominios();

function condSelecionado(){
  // Por enquanto as unidades embutidas pertencem ao APVC; outros condomínios carregam do banco
  carregarUnidades();
}


function showMsg(txt, tipo){ const m=$('msg'); m.textContent=txt; m.className='msg '+tipo; }

// Monta o <select> a partir de uma lista [{c:cod, r:rua}]
function montarSelectUnidades(lista){
  const sel=$('c-unidade');
  if(!lista || !lista.length){
    sel.innerHTML='<option value="">Nenhuma unidade cadastrada</option>';
    $('uni-hint').textContent='Nenhuma unidade encontrada — contate a administração.';
    return;
  }
  lista.sort((a,b)=>a.c.localeCompare(b.c,'pt-BR',{numeric:true}));
  const grupos={};
  lista.forEach(u=>{ const q=(u.c.match(/^[A-Za-z]+/)||[u.c[0]])[0].toUpperCase(); (grupos[q]=grupos[q]||[]).push(u); });
  let html='<option value="">Selecione sua unidade...</option>';
  Object.keys(grupos).sort().forEach(q=>{
    html+='<optgroup label="Bloco '+q+'">';
    grupos[q].forEach(u=>{ html+='<option value="'+u.c+'">'+u.c+(u.r?' \u2014 '+u.r:'')+'</option>'; });
    html+='</optgroup>';
  });
  sel.innerHTML=html;
  $('uni-hint').textContent='Selecione a unidade correspondente ao seu im\u00f3vel.';
}

// Carrega as unidades: usa a lista embutida (sempre funciona) e tenta atualizar via Firebase
async function carregarUnidades(){
  montarSelectUnidades(UNIDADES_FALLBACK); // imediato, sem depender de conexão
  if(!SB) return;
  const cond = $('c-cond').value || 'APVC';
  try{
    const { data } = await SB.from('unidades_publicas').select('cod,rua').eq('condominio_id', cond);
    if(data && data.length){
      const atual = $('c-unidade').value;
      montarSelectUnidades(data.map(u=>({c:u.cod, r:u.rua||''})));
      if(atual) $('c-unidade').value=atual;
    } else if(cond!=='APVC'){
      montarSelectUnidades([]); // condomínio novo ainda sem unidades
    }
  }catch(e){ /* mantém a lista embutida */ }
}

carregarUnidades();

async function enviar(){
  const nome=$('c-nome').value.trim();
  const email=$('c-email').value.trim().toLowerCase();
  const tel=$('c-tel').value.trim();
  const condominio=$('c-cond').value;
  const unidade=$('c-unidade').value;
  const vinculo=$('c-vinculo').value;
  const senha=$('c-senha').value;
  const senha2=$('c-senha2').value;

  if(!nome){ return showMsg('Informe seu nome completo.','err'); }
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ return showMsg('Informe um e-mail válido.','err'); }
  if(tel.replace(/\D/g,'').length < 10){ return showMsg('Informe um número de WhatsApp válido (com DDD).','err'); }
  if(!condominio){ return showMsg('Selecione o seu condomínio.','err'); }
  if(!unidade){ return showMsg('Selecione a sua unidade.','err'); }
  if(!vinculo){ return showMsg('Selecione o seu vínculo com a unidade.','err'); }
  if(senha.length<6){ return showMsg('A senha deve ter no mínimo 6 caracteres.','err'); }
  if(senha!==senha2){ return showMsg('As senhas não conferem.','err'); }
  if(!$('c-lgpd') || !$('c-lgpd').checked){ return showMsg('É necessário aceitar o termo de proteção de dados (LGPD) para continuar.','err'); }

  if(!SB){ return showMsg('Sem conexão com o servidor. Verifique sua internet e recarregue a página.','err'); }
  const btn=$('btn'); btn.disabled=true; btn.textContent='Enviando...';
  try{
    // 1) Cria a conta de acesso (o próprio morador define a senha — nada de senha em texto puro)
    const cad = await SB.auth.signUp({
      email, password: senha,
      options:{ data:{ nome, condominio, unidade, vinculo } }
    });
    if(cad.error){
      const m=(cad.error.message||'').toLowerCase();
      if(m.includes('already') || m.includes('registered')){
        showMsg('Este e-mail já possui cadastro. Se já foi aprovado, faça login; senão aguarde a aprovação.','err');
      } else {
        showMsg('Não foi possível criar o acesso: '+cad.error.message,'err');
      }
      btn.disabled=false; btn.textContent='Solicitar acesso'; return;
    }
    const authId = cad.data && cad.data.user ? cad.data.user.id : null;

    // 2) Registra a solicitação (a administração aprova depois). Sem senha aqui.
    const sol = await SB.from('solicitacoes').insert({
      auth_id: authId, condominio_id: condominio,
      nome, email, tel, unidade, vinculo, nivel:'morador', status:'pendente'
    });
    if(sol.error) throw sol.error;

    // Não deixa o solicitante logado no navegador
    try{ await SB.auth.signOut(); }catch(_){}

    $('form').reset(); carregarCondominios(); carregarUnidades();
    var _msgOk='A administração vai analisar e liberar seu acesso à unidade '+unidade+'. Você usará o e-mail e a senha que acabou de cadastrar.';
    if($('ok-txt')) $('ok-txt').textContent=_msgOk;
    if($('ok-ov')) $('ok-ov').style.display='flex';
    showMsg('✓ Solicitação enviada! '+_msgOk,'ok');
  }catch(e){
    if(String(e.code||e.message||'').toLowerCase().includes('permission')||String(e.message||'').toLowerCase().includes('row-level')){
      showMsg('O servidor recusou o envio (permissões). Avise a administração para liberar o cadastro público.','err');
    } else {
      showMsg('Erro ao enviar: '+(e.message||e),'err');
    }
  }
  btn.disabled=false; btn.textContent='Solicitar acesso';
}
</script>
