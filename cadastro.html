<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AdminPro · Solicitar Acesso</title>
<meta name="theme-color" content="#132040">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --ink:#0D1629; --card:#1A2847; --card-2:#1F2D52;
    --border:rgba(255,255,255,0.10); --border-h:rgba(255,255,255,0.20);
    --gold:#E87722; --gold-l:#FF9A40; --green-l:#28C882; --red:#E05252;
    --text:#EEF1F8; --text-2:#8A9BBB; --text-3:#4E6080;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    background:linear-gradient(160deg,#1B2B5E,#0D1629);
    color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:28px 16px;min-height:100vh;
  }
  .box{
    width:100%;max-width:460px;background:var(--card);
    border:1px solid var(--border);border-radius:18px;
    box-shadow:0 24px 60px rgba(0,0,0,0.45);padding:34px 30px;
  }
  .brand{text-align:center;margin-bottom:6px;font-size:26px;font-weight:800;letter-spacing:.5px}
  .brand b{color:var(--gold)}
  .sub{text-align:center;color:var(--text-2);font-size:13.5px;margin-bottom:24px}
  label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin:14px 0 6px;letter-spacing:.3px}
  .req::after{content:' *';color:var(--gold)}
  .iw{position:relative}
  .iw i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:13px;opacity:.85}
  input,select{
    width:100%;padding:11px 14px 11px 38px;border-radius:10px;
    border:1px solid var(--border);background:var(--ink);color:var(--text);
    font-size:14px;outline:none;transition:border-color .15s;
  }
  select{cursor:pointer}
  input:focus,select:focus{border-color:var(--gold)}
  .hint{font-size:11px;color:var(--text-3);margin-top:5px}
  .btn{
    width:100%;margin-top:22px;padding:13px;border:none;border-radius:10px;
    background:linear-gradient(135deg,#B85E0F,#E87722 60%,#FF9A40);
    color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px;
    box-shadow:0 8px 20px rgba(232,119,34,0.3);transition:filter .15s;
  }
  .btn:hover{filter:brightness(1.06)}
  .btn:disabled{filter:grayscale(.5) brightness(.8);cursor:not-allowed}
  .msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:13px;display:none;line-height:1.5}
  .msg.ok{display:block;background:rgba(40,200,130,0.12);border:1px solid rgba(40,200,130,0.35);color:var(--green-l)}
  .msg.err{display:block;background:rgba(224,82,82,0.12);border:1px solid rgba(224,82,82,0.35);color:#ff9b9b}
  .foot{text-align:center;margin-top:20px;font-size:13px;color:var(--text-3)}
  .foot a{color:var(--gold);text-decoration:none;font-weight:600}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:420px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
  <form class="box" id="form" onsubmit="return false">
    <div class="brand">Admin<b>Pro</b></div>
    <div class="sub">Solicitar acesso ao portal do condomínio</div>

    <label class="req">Nome completo</label>
    <div class="iw"><i class="fa-solid fa-user"></i>
      <input type="text" id="c-nome" placeholder="Seu nome completo" autocomplete="name"></div>

    <label class="req">E-mail</label>
    <div class="iw"><i class="fa-solid fa-envelope"></i>
      <input type="email" id="c-email" placeholder="voce@exemplo.com" autocomplete="email"></div>

    <label>Telefone / WhatsApp</label>
    <div class="iw"><i class="fa-brands fa-whatsapp"></i>
      <input type="text" id="c-tel" placeholder="(11) 99999-9999" autocomplete="tel"></div>

    <div class="row2">
      <div>
        <label class="req">Unidade</label>
        <div class="iw"><i class="fa-solid fa-house-chimney"></i>
          <select id="c-unidade"><option value="">Carregando unidades...</option></select></div>
      </div>
      <div>
        <label class="req">Vínculo</label>
        <div class="iw"><i class="fa-solid fa-id-badge"></i>
          <select id="c-vinculo">
            <option value="">Selecione...</option>
            <option value="proprietario">Proprietário</option>
            <option value="morador">Morador</option>
            <option value="inquilino">Inquilino</option>
          </select></div>
      </div>
    </div>
    <div class="hint" id="uni-hint">Selecione a unidade correspondente ao seu imóvel.</div>

    <div class="row2">
      <div>
        <label class="req">Senha</label>
        <div class="iw"><i class="fa-solid fa-lock"></i>
          <input type="password" id="c-senha" placeholder="Mín. 6 caracteres" autocomplete="new-password"></div>
      </div>
      <div>
        <label class="req">Confirmar senha</label>
        <div class="iw"><i class="fa-solid fa-lock"></i>
          <input type="password" id="c-senha2" placeholder="Repita a senha" autocomplete="new-password"></div>
      </div>
    </div>

    <button class="btn" id="btn" onclick="enviar()">Solicitar acesso</button>
    <div class="msg" id="msg"></div>

    <div class="foot">Já tem conta? <a href="adminpro.html">Entrar no portal &rarr;</a></div>
  </form>

<!-- Firebase (mesma config do app) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDpyQdCZFM6veIlxcoZXpEeDYH9ACxcGK8",
  authDomain: "apvc-86992.firebaseapp.com",
  projectId: "apvc-86992",
  storageBucket: "apvc-86992.firebasestorage.app",
  messagingSenderId: "849214468014",
  appId: "1:849214468014:web:a43dda597edf3cc071a23f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const $ = id => document.getElementById(id);

function showMsg(txt, tipo){ const m=$('msg'); m.textContent=txt; m.className='msg '+tipo; }

// Carrega as unidades cadastradas pelo administrador (Cadastrar Unidades)
async function carregarUnidades(){
  const sel=$('c-unidade');
  try{
    const doc = await db.collection('apvc_data').doc('unidades').get();
    let unidades = {};
    if(doc.exists){ try{ unidades = JSON.parse(doc.data().value||'{}'); }catch(_){ unidades={}; } }
    const cods = Object.keys(unidades).sort((a,b)=>a.localeCompare(b,'pt-BR',{numeric:true}));
    if(!cods.length){
      sel.innerHTML='<option value="">Nenhuma unidade cadastrada</option>';
      $('uni-hint').textContent='Nenhuma unidade encontrada — contate a administração.';
      return;
    }
    // Agrupa por bloco (primeira letra)
    const grupos={};
    cods.forEach(c=>{ const q=(c.match(/^[A-Za-z]+/)||[c[0]])[0].toUpperCase(); (grupos[q]=grupos[q]||[]).push(c); });
    let html='<option value="">Selecione sua unidade...</option>';
    Object.keys(grupos).sort().forEach(q=>{
      html+=`<optgroup label="Bloco ${q}">`;
      grupos[q].forEach(c=>{
        const d=unidades[c]||{};
        const extra=d.rua?` — ${d.rua}`:'';
        html+=`<option value="${c}">${c}${extra}</option>`;
      });
      html+='</optgroup>';
    });
    sel.innerHTML=html;
  }catch(e){
    sel.innerHTML='<option value="">Erro ao carregar unidades</option>';
    $('uni-hint').textContent='Não foi possível carregar as unidades. Verifique a conexão.';
  }
}
carregarUnidades();

async function enviar(){
  const nome=$('c-nome').value.trim();
  const email=$('c-email').value.trim().toLowerCase();
  const tel=$('c-tel').value.trim();
  const unidade=$('c-unidade').value;
  const vinculo=$('c-vinculo').value;
  const senha=$('c-senha').value;
  const senha2=$('c-senha2').value;

  if(!nome){ return showMsg('Informe seu nome completo.','err'); }
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ return showMsg('Informe um e-mail válido.','err'); }
  if(!unidade){ return showMsg('Selecione a sua unidade.','err'); }
  if(!vinculo){ return showMsg('Selecione o seu vínculo com a unidade.','err'); }
  if(senha.length<6){ return showMsg('A senha deve ter no mínimo 6 caracteres.','err'); }
  if(senha!==senha2){ return showMsg('As senhas não conferem.','err'); }

  const btn=$('btn'); btn.disabled=true; btn.textContent='Enviando...';
  try{
    // Evita duplicidade de e-mail já ativo/pendente
    const jaU = await db.collection('apvc_usuarios').where('email','==',email).get();
    const jaS = await db.collection('apvc_solicitacoes').where('email','==',email).get();
    if(!jaU.empty || !jaS.empty){
      showMsg('Este e-mail já possui cadastro ou solicitação. Aguarde a aprovação ou faça login.','err');
      btn.disabled=false; btn.textContent='Solicitar acesso'; return;
    }
    await db.collection('apvc_solicitacoes').add({
      nome, email, tel,
      lote: unidade,     // unidade escolhida (mantém a chave "lote" usada pelo app)
      unidade,           // também salvo explicitamente
      vinculo,
      senha,             // usado na aprovação para criar a conta de acesso
      nivel: 'morador',
      status: 'pendente',
      dataSolicitacao: new Date().toISOString()
    });
    $('form').reset();
    carregarUnidades();
    showMsg('✓ Solicitação enviada! A administração vai analisar e liberar seu acesso à unidade '+unidade+'.','ok');
  }catch(e){
    showMsg('Erro ao enviar: '+(e.message||e),'err');
  }
  btn.disabled=false; btn.textContent='Solicitar acesso';
}
</script>
</body>
</html>
