<style>

</style>

const $=id=>document.getElementById(id);
let sb=null; try{ sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY); }catch(e){}
let _log='';
function log(t,cls){ _log+=t+'\n'; const o=$('out'); o.textContent=_log; o.className='out '+(cls||''); }
function chunk(a,n){ const r=[]; for(let i=0;i<a.length;i+=n) r.push(a.slice(i,i+n)); return r; }

async function upsertTudo(tabela, linhas, conflito){
  let ok=0;
  for(const parte of chunk(linhas,200)){
    const { error }=await sb.from(tabela).upsert(parte,{onConflict:conflito});
    if(error) throw new Error(tabela+': '+error.message);
    ok+=parte.length; log('  '+tabela+': '+ok+'/'+linhas.length+' enviados...','dim');
  }
  return ok;
}

async function migrar(){
  _log=''; $('btn').disabled=true;
  try{
    if(!sb) throw new Error('Biblioteca Supabase nao carregou.');
    log('Entrando...','dim');
    const { error:eLog }=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('senha').value});
    if(eLog) throw new Error('Login: '+eLog.message);
    log('Login OK. Iniciando envio...\n','ok');

    log('1) Localizacoes...','dim');
    await upsertTudo('localizacoes', DADOS.localizacoes, 'condominio_id,cod');
    log('2) Unidades...','dim');
    await upsertTudo('unidades', DADOS.unidades, 'condominio_id,cod');
    log('3) Condominos (com dependentes e telefones)...','dim');
    await upsertTudo('condominos', DADOS.condominos, 'condominio_id,cod');
    log('4) Sequencia de codigo...','dim');
    await sb.from('modulo_dados').upsert({condominio_id:'APVC',modulo:'condseq',valor:DADOS.condseq},{onConflict:'condominio_id,modulo'});

    // Conferencia
    const c1=await sb.from('unidades').select('*',{count:'exact',head:true}).eq('condominio_id','APVC');
    const c2=await sb.from('condominos').select('*',{count:'exact',head:true}).eq('condominio_id','APVC');
    const c3=await sb.from('localizacoes').select('*',{count:'exact',head:true}).eq('condominio_id','APVC');
    log('\nMIGRACAO CONCLUIDA!','ok');
    log('  Unidades no banco: '+c1.count,'ok');
    log('  Condominos no banco: '+c2.count,'ok');
    log('  Localizacoes no banco: '+c3.count,'ok');
    log('\nTudo pronto. Pode fechar esta pagina.','big');
  }catch(e){
    log('\nERRO: '+e.message,'err');
    log('(Se for permissao, confirme que voce e super-admin no teste anterior.)','dim');
  }
  $('btn').disabled=false;
}
