<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AdminPro · Portal de Gestão</title>
<meta name="theme-color" content="#132040">
<!-- Abre o app automaticamente -->
<meta http-equiv="refresh" content="0; url=adminpro.html">
<link rel="canonical" href="adminpro.html">
<style>
  html,body{height:100%;margin:0}
  body{
    background:linear-gradient(160deg,#1B2B5E,#0D1629);
    color:#EEF1F8;font-family:'Segoe UI',system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  }
  .ring{
    width:54px;height:54px;border-radius:50%;
    border:4px solid rgba(232,119,34,0.25);border-top-color:#E87722;
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .ttl{font-size:22px;font-weight:600;letter-spacing:.5px}
  .ttl b{color:#E87722}
  a{color:#E87722;text-decoration:none;font-size:14px}
  a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="ring"></div>
  <div class="ttl">Admin<b>Pro</b></div>
  <a href="adminpro.html">Abrir o portal &rarr;</a>
  <script>location.replace('adminpro.html');</script>
</body>
